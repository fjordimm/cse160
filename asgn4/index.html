<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>asgn3</title>
</head>

<body onload="main()">
    <div style="display: flex; flex-direction: row; gap: 10px;">
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 10px;">
            <div style="display: flex; flex-direction: row; gap: 10px;">
                <span>FPS:</span>
                <textarea id="fpsdisplay" readOnly style="resize: none; width: 5em; height: 3ex;">---</textarea>
            </div>
            
            <canvas id="webgl" width="600" height="600">
                Please use a browser that supports "canvas"
            </canvas>

            <span>Click anywhere on the canvas to use mouse control. Then hit escape to get your mouse back.</span>

            <span>Use WASD, Space, and Shift to move around.</span>

            <div style="display: flex; flex-direction: row; gap: 10px;">
                <div>
                    <input type="checkbox" id="point-light" name="point-light" checked>
                    <label for="point-light">Point Light</label>
                </div>
                <div>
                    <input type="checkbox" id="spot-light" name="spot-light" checked>
                    <label for="spot-light">Spotlight</label>
                </div>
                <div>
                    <input type="checkbox" id="toggle-normal-visualization" name="toggle-normal-visualization">
                    <label for="toggle-normal-visualization">Toggle Normal Visualization</label>
                </div>
            </div>

            <div style="display: flex; flex-direction: row; gap: 10px;">
                <span>Point Light:</span>
                <span>X</span>
                <input id="slider-point-light-x" type="range" min="-10" max="10" step="0.1" value="0">
                <span>Y</span>
                <input id="slider-point-light-y" type="range" min="-10" max="10" step="0.1" value="0">
                <span>Z</span>
                <input id="slider-point-light-z" type="range" min="-10" max="10" step="0.1" value="0">
            </div>

            <div style="display: flex; flex-direction: row; gap: 10px;">
                <span>Spotlight:</span>
                <span>X</span>
                <input id="slider-spot-light-x" type="range" min="-10" max="10" step="0.1" value="-3">
                <span>Y</span>
                <input id="slider-spot-light-y" type="range" min="-10" max="10" step="0.1" value="-3">
                <span>Z</span>
                <input id="slider-spot-light-z" type="range" min="-10" max="10" step="0.1" value="3">
            </div>

            <div style="display: flex; flex-direction: row; gap: 10px;">
                <span>Spotlight Rotation:</span>
                <span>Horizontal</span>
                <input id="slider-spot-light-horiz" type="range" min="-180" max="180" step="0.1" value="0">
                <span>Vertical</span>
                <input id="slider-spot-light-vert" type="range" min="-90" max="90" step="0.1" value="-80">
            </div>
        </div>
    </div>

    <script src="./lib/webgl-utils.js"></script>
    <script src="./lib/webgl-debug.js"></script>
    <script src="./lib/cuon-utils.js"></script>
    <script src="./lib/cuon-matrix.js"></script>
    <script type="module" src="./src/util.js"></script>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/GameManager.js"></script>
    <script type="module" src="./src/GraphicsManager.js"></script>
    <script type="module" src="./src/CursorManager.js"></script>
    <script type="module" src="./src/drawTriangle.js"></script>
    <script type="module" src="./src/Camera.js"></script>
    <script type="module" src="./src/Component.js"></script>
    <script type="module" src="./src/shapes/Cube.js"></script>
    <script type="module" src="./src/shapes/Sphere.js"></script>
    <script type="module" src="./src/game.js"></script>
    <script type="module" src="./src/PointLight.js"></script>
    <script type="module" src="./src/SpotLight.js"></script>
</body>

</html>
